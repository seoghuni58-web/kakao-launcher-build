name: Build Mac KakaoLauncher

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyinstaller

      - name: Build Mac App
        run: |
          python3 -m PyInstaller --windowed --name KakaoLauncher kakao_program_launcher_v24_hidden_server.py

      - name: Zip App
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent KakaoLauncher.app KakaoLauncherMac.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KakaoLauncherMac
          path: dist/KakaoLauncherMac.zip
